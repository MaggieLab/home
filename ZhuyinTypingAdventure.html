<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBF6EE">
  <meta name="description" content="注音打字冒險 Zhuyin Typing Adventure——一邊冒險，一邊學會注音打字。">

  <link rel="icon" type="image/png" sizes="16x16" href="favicons/icon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============ Design System tokens（與 design-system.html 同步維護） ============ */
    :root {
      color-scheme: light;
      --bg: #FBF6EE;
      --paper: #FFFCF6;
      --ink: #3D2F27;
      --text: #6B5847;
      --muted: #A7937E;
      --line: rgba(61, 47, 39, .09);
      --line-soft: rgba(61, 47, 39, .06);
      --clay: #B97A53;
      --clay-deep: #8C5836;
      --radius-card: 6px;
      --radius-pill: 999px;
      --ease: .22s ease;
      --max: 980px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-width: 320px;
      background: var(--bg); color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.85; -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    h1, h2, h3, p { margin: 0; }
    .serif { font-family: "Noto Serif TC", serif; }
    .shell { width: min(var(--max), calc(100% - 48px)); margin-inline: auto; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(251, 246, 238, .96);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner { min-height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; }
    .back-link:hover { color: var(--clay-deep); }
    .version-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; color: var(--clay-deep);
      background: var(--bg); border: 1px solid var(--line);
      padding: 4px 10px; border-radius: var(--radius-pill);
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    section { padding: 72px 0; }
    .divider { width: 1px; height: 44px; margin: 0 auto; background: linear-gradient(to bottom, transparent, var(--line), transparent); }

    /* ============ HERO（目前還沒有封面圖，先用淡色佔位） ============ */
    .lp-hero { padding: 0; }
    .lp-hero-visual {
      position: relative; aspect-ratio: 16/9; overflow: hidden;
      background: linear-gradient(155deg, #F2E2CC, #E3CBA4);
    }
    .lp-hero-visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
    }

    .lp-hero-actions {
      display: flex; flex-wrap: wrap; align-items: center; gap: 18px;
      padding: 24px clamp(20px,5vw,0) 0;
      justify-content: center;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      border-radius: var(--radius-pill); padding: 12px 24px;
      border: 1px solid transparent; font-size: 14.5px; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: transform var(--ease), background var(--ease), opacity var(--ease);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { color: #FFFCF6; background: var(--clay-deep); }
    .btn-primary:hover { background: #6f4527; }
    .btn-text { color: var(--text); padding: 12px 4px; border-bottom: 1px solid var(--line); border-radius: 0; }
    .btn-text:hover { color: var(--clay-deep); border-color: var(--clay-deep); }

    /* ============ SECTION HEAD ============ */
    .section-head { max-width: 580px; margin: 0 auto 40px; text-align: center; }
    .kicker { display: block; margin-bottom: 12px; color: var(--muted); font-size: 13px; font-weight: 500; letter-spacing: .12em; }
    h2 { font-family: "Noto Serif TC", serif; font-weight: 600; color: var(--ink); font-size: clamp(21px, 2.8vw, 26px); line-height: 1.5; }
    .section-copy { margin-top: 14px; color: var(--text); font-size: 15px; }

    /* ============ 作品介紹：直接引用品牌素材，不重新排版內容 ============ */
    .brand-asset { max-width: 720px; margin: 0 auto; }
    .brand-asset img {
      width: 100%; height: auto; display: block;
      border-radius: var(--radius-card);
      box-shadow: 0 1px 2px rgba(61,47,39,.05), 0 16px 32px -18px rgba(61,47,39,.16);
    }

    /* ============ Beta 成長紀錄 ============ */
    .beta-block {
      max-width: 480px; margin: 0 auto; text-align: center;
      background: var(--paper); border-radius: var(--radius-card);
      padding: clamp(28px, 5vw, 36px) clamp(22px, 4vw, 32px);
      box-shadow: 0 1px 2px rgba(61,47,39,.05);
    }
    .beta-block .beta-label {
      font-size: 13px; font-weight: 600; color: var(--clay-deep); letter-spacing: .04em;
    }
    .beta-block p.beta-headline {
      margin-top: 14px; color: var(--ink); font-size: 16px; line-height: 1.8;
    }
    .beta-block p.beta-headline strong { font-family: "Noto Serif TC", serif; color: var(--clay-deep); font-size: 19px; }
    .beta-block p.beta-stats {
      margin-top: 12px; color: var(--muted); font-size: 13px;
    }
    .beta-block p.beta-thanks {
      margin-top: 16px; color: var(--text); font-size: 13.5px;
    }
    .beta-block.is-loading .beta-headline,
    .beta-block.is-loading .beta-stats { opacity: .6; }

    /* ============ 家長中心 ============ */
    .parent-center { max-width: 520px; margin: 0 auto; text-align: center; }
    .parent-center h2 { margin-bottom: 24px; }
    .parent-links {
      display: grid; gap: 12px;
      grid-template-columns: repeat(2, 1fr);
    }
    .parent-links a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 16px;
      background: var(--paper); border-radius: var(--radius-card);
      box-shadow: 0 1px 2px rgba(61,47,39,.05);
      color: var(--ink); text-decoration: none; font-size: 14px; font-weight: 600;
      transition: transform var(--ease);
    }
    .parent-links a:hover { transform: translateY(-2px); }

    /* ============ CTA band ============ */
    .cta-band {
      background: var(--paper); border-radius: var(--radius-card);
      padding: clamp(36px, 6vw, 52px) clamp(24px, 5vw, 48px);
      text-align: center;
      box-shadow: 0 1px 2px rgba(61,47,39,.05), 0 20px 40px -18px rgba(61,47,39,.14);
    }
    .cta-band h2 { margin-bottom: 10px; }
    .cta-band p { color: var(--text); font-size: 14.5px; margin-bottom: 24px; }

    /* ============ FOOTER ============ */
    .footer { padding: 40px 0 max(32px, env(safe-area-inset-bottom)); border-top: 1px solid var(--line); text-align: center; }
    .footer p { color: var(--muted); font-size: 13px; }
    .footer a { color: var(--clay-deep); text-decoration: none; font-weight: 600; }

    @media (min-width: 760px) {
      section { padding: 96px 0; }
    }
  </style>
</head>
<body>

  <main>

      <div class="lp-hero-visual">
        <img src="images/zhuyin-cover.webp" alt="注音打字冒險 Zhuyin Typing Adventure 封面：小雞背著背包，走向ㅓㅗㄇㄈ石板路">
      </div>
      <div class="lp-hero-actions">

    <div class="divider"></div>

    <section class="shell" id="intro" aria-label="作品介紹">

        <a class="btn btn-primary" href="https://maggie10299.github.io/zhuyin-game/" target="_blank" rel="noopener">開始遊戲</a>

    <div class="divider"></div>

        <div class="parent-links">
          <!-- TODO: 連結之後補上 -->

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
  <script>
    // 注音打字冒險 產品專屬 Beta 成長紀錄：從 data.products.typing_adventure 讀取
    (function () {
      const endpoint = "https://script.google.com/macros/s/AKfycbwFuPv3IoIuv0ZcxRsQNVLO3K2J6WKkqqkK3CUox318AxB9bVrBoZl2L8NmWRQMsS4/exec";
      const blockEl = document.querySelector("#betaBlock");
      const headlineEl = document.querySelector("#betaHeadline");
      const statsEl = document.querySelector("#betaStats");
      const thanksEl = document.querySelector("#betaThanks");

      // 已知的「次數型」統計欄位 → 顯示文字，未來新增欄位只要加在這裡就會自動出現
      const STAT_LABELS = {
        finish_level: (v) => `${v} 次過關`,
        typing_correct: (v) => `${v} 次打對`,
        typing_error: (v) => `${v} 次打錯`
      };

      function showFallback() {
        blockEl.classList.remove("is-loading");
        headlineEl.textContent = "Beta 測試資料更新中…";
        statsEl.textContent = "";
        thanksEl.hidden = true;
      }

      fetch(endpoint)
        .then((response) => {
          if (!response.ok) throw new Error("Request failed");
          return response.json();
        })
        .then((data) => {
          const product = data && data.products && data.products.typing_adventure;
          if (!product || typeof product !== "object") throw new Error("products.typing_adventure 還沒有資料");

          const players = product.beta_players;
          const hasAnyKnownField =
            players !== undefined ||
            Object.keys(STAT_LABELS).some((key) => product[key] !== undefined);

          if (!hasAnyKnownField) throw new Error("No usable fields in products.typing_adventure");

          blockEl.classList.remove("is-loading");

          if (players !== undefined) {
            headlineEl.innerHTML = `目前已有<br><strong>${players}</strong> 個家庭<br>一起練習注音打字。`;
          } else {
            headlineEl.textContent = "";
          }

          const statParts = [];
          Object.keys(STAT_LABELS).forEach((key) => {
            if (product[key] !== undefined) statParts.push(STAT_LABELS[key](product[key]));
          });
          if (product.version !== undefined) statParts.push(`Beta ${product.version}`);
          statsEl.textContent = statParts.join(" · ");

          thanksEl.hidden = false;
        })
        .catch(showFallback);
    })();
  </script>
